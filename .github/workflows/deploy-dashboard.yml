name: Deploy dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Check types
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: Build
        working-directory: dashboard
        run: npx vite build

      # The analysis payload lives under public and Vite copies it into the build
      # output, but the copy is worth asserting rather than assuming: a dashboard that
      # deploys without its data renders an error page instead of the analysis.
      - name: Confirm the analysis payload shipped
        working-directory: dashboard
        run: test -f dist/data/analysis.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
